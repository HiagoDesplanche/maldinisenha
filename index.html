<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Cyber Password Generator 🔥</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Matrix Rain Effect -->
<div class="matrix-rain" id="matrixRain"></div>

<div class="container">
    <h1 class="glitch">CYBER PASSWORD GENERATOR</h1>

    <!-- Maldini Images -->
    <div class="maldini-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Paolo_Maldini_2009.jpg/800px-Paolo_Maldini_2009.jpg" alt="Paolo Maldini">
        <img src="https://assets.goal.com/v3/assets/bltcc7a7ffd4fbf71f5/blt5a8d3e8f5a6b3c7d/60c9d8e4f8a9b7c9d8e4f8a9/paolo_maldini.jpg" alt="Maldini 2">
        <img src="https://www.acmilan.com/images/legends/maldini.jpg" alt="Maldini 3">
    </div>

    <!-- Luva de Pedreiro Images -->
    <div class="pedreiro-section">
        <img src="https://i.ytimg.com/vi/mXZyx4Kp8VE/maxresdefault.jpg" alt="Luva de Pedreiro">
        <img src="https://pbs.twimg.com/media/E8k4QJxWQAEzXVw.jpg" alt="Luva de Pedreiro 2">
        <img src="https://s2.glbimg.com/5m4c4q2zZt1VvG4VvG4VvG4/620x465/2021/08/23/luva-de-pedreiro.jpg" alt="Luva de Pedreiro 3">
    </div>

    <div class="input-group">
        <label>🔐 COMPRIMENTO: <span id="lengthValue">16</span></label>
        <input type="range" id="length" min="8" max="64" value="16">
    </div>

    <div class="options">
        <label><input type="checkbox" id="upper" checked> MAIÚSCULAS</label>
        <label><input type="checkbox" id="lower" checked> MINÚSCULAS</label>
        <label><input type="checkbox" id="numbers" checked> NÚMEROS</label>
        <label><input type="checkbox" id="symbols" checked> SÍMBOLOS</label>
    </div>

    <div class="password-container">
        <input id="password" readonly placeholder="SENHA GERADA">
        <span class="eye-icon" onclick="togglePasswordVisibility()">👁️</span>
    </div>

    <div class="button-group">
        <button onclick="generatePassword()">⚡ GERAR</button>
        <button onclick="copyPassword()">📋 COPIAR</button>
        <button onclick="clearPassword()">🗑️ LIMPAR</button>
    </div>

    <div id="strength">FORÇA: <span id="strengthText">AGUARDANDO...</span></div>

    <!-- Footer -->
    <footer>
        <p>Desenvolvido por <span class="highlight">Hiago</span> | Cyber Security 🔒</p>
        <div class="social-links">
            <a href="#" onclick="alert('GitHub: Hiago-Cyber')">🐙 GitHub</a>
            <a href="#" onclick="alert('LinkedIn: Hiago Silva')">💼 LinkedIn</a>
            <a href="#" onclick="alert('Email: hiago@cyber.com')">📧 Email</a>
        </div>
        <p class="copy">© 2026 - Todos os direitos reservados</p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
